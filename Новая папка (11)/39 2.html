    <body>
  <input type="checkbox"> Чекбокс 1
<input type="checkbox"> Чекбокс 2
<input type="checkbox" checked> Чекбокс 3
<script>
   $(document).ready(function() {
    // Устанавливаем все неотмеченные чекбоксы в отмеченные
    $('input[type="checkbox"]:not(:checked)').prop('checked', true);
  });
</script>
